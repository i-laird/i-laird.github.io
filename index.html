<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ian Laird</title>
  <meta name="description" content="Ian Laird — Software Engineer">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:       #00ff41;
      --green-dim:   #00802b;
      --green-bright:#7fff8f;
      --blue:        #4fc3f7;
      --red:         #ff5555;
      --white:       #d0d0d0;
      --bg:          #0a0e0a;
      --bar:         #141814;
      --border:      #1e261e;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--green);
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      line-height: 1.55;
    }

    /* ── CRT scanlines ── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        180deg,
        transparent 0px, transparent 2px,
        rgba(0,0,0,.06) 2px, rgba(0,0,0,.06) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* ── Outer window ── */
    .window {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    /* ── Title bar ── */
    .titlebar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 16px;
      background: var(--bar);
      border-bottom: 1px solid var(--border);
      user-select: none;
    }

    .dot { width: 13px; height: 13px; border-radius: 50%; }
    .dot.r { background: #ff5f57; }
    .dot.y { background: #febc2e; }
    .dot.g { background: #28c840; }

    .titlebar-label {
      flex: 1;
      text-align: center;
      color: #555;
      font-size: 12px;
      letter-spacing: .04em;
    }

    /* ── Terminal body ── */
    .terminal {
      flex: 1;
      overflow-y: auto;
      padding: 18px 22px 12px;
      cursor: text;
      scroll-behavior: smooth;
    }

    .terminal::-webkit-scrollbar { width: 6px; }
    .terminal::-webkit-scrollbar-track { background: transparent; }
    .terminal::-webkit-scrollbar-thumb { background: var(--green-dim); border-radius: 3px; }

    /* ── Output lines ── */
    .line { display: block; white-space: pre-wrap; word-break: break-word; margin: 0; }
    .line + .line { margin-top: 1px; }
    .dim   { color: var(--green-dim); }
    .white { color: var(--white); }
    .bold  { color: var(--green-bright); font-weight: bold; }
    .blue  { color: var(--blue); }
    .err   { color: var(--red); }

    pre.ascii {
      color: var(--green);
      font-size: 16px;
      line-height: 1.3;
      white-space: pre;
      letter-spacing: .05em;
    }

    /* ── Input row ── */
    .input-row {
      display: flex;
      align-items: center;
      margin-top: 4px;
    }

    .prompt { white-space: nowrap; }
    .p-user { color: var(--green-bright); }
    .p-sep  { color: #444; }
    .p-host { color: var(--blue); }
    .p-path { color: #555; }
    .p-sym  { color: var(--green); }

    #cmd {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--green);
      font: inherit;
      caret-color: var(--green);
      min-width: 0;
    }

    /* ── Link cards ── */
    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 10px 0 6px;
    }

    .card {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
      color: var(--green);
      border: 1px solid var(--green-dim);
      padding: 7px 16px;
      border-radius: 3px;
      font: inherit;
      font-size: 14px;
      transition: background .12s, color .12s, border-color .12s;
      background: transparent;
      cursor: pointer;
    }

    .card:hover {
      background: var(--green);
      color: var(--bg);
      border-color: var(--green);
    }

    .card svg { flex-shrink: 0; }

    @media (max-width: 540px) {
      pre.ascii { font-size: 7px; }
      .terminal { padding: 12px 14px 10px; }
      body { font-size: 13px; }
    }
  </style>
</head>
<body>

<div class="window">
  <div class="titlebar">
    <div class="dot r"></div>
    <div class="dot y"></div>
    <div class="dot g"></div>
    <div class="titlebar-label">ian@portfolio — bash — 80×24</div>
    <div style="width:43px"></div><!-- balance -->
  </div>

  <div class="terminal" id="terminal" onclick="focusCmd()">
    <div id="out"></div>
    <div class="input-row" id="input-row" style="display:none">
      <span class="prompt">
        <span class="p-user">ian</span><span class="p-sep">@</span><span class="p-host">portfolio</span><span class="p-path">:~</span><span class="p-sym">$ </span>
      </span>
      <input id="cmd" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>
  </div>
</div>

<script>
  const out      = document.getElementById('out');
  const inputRow = document.getElementById('input-row');
  const cmd      = document.getElementById('cmd');
  const terminal = document.getElementById('terminal');

  function focusCmd() { cmd.focus(); }
  function scroll() { terminal.scrollTop = terminal.scrollHeight; }

  /* ── Append helpers ── */
  function line(html = '', cls = '') {
    const el = document.createElement('span');
    el.className = 'line' + (cls ? ' ' + cls : '');
    el.innerHTML = html;
    out.appendChild(el);
    scroll();
    return el;
  }

  function blank() { line(''); }

  function appendNode(node) { out.appendChild(node); scroll(); }

  /* ── Boot sequence ── */
  async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  async function boot() {
    await sleep(120);
    appendNode((() => {
      const pre = document.createElement('pre');
      pre.className = 'ascii';
      pre.textContent =
`  ╔══════════════════════════╗
  ║        IAN  LAIRD        ║
  ╚══════════════════════════╝`;
      return pre;
    })());

    await sleep(60);  blank();
    await sleep(80);  line('<span class="white">Software Engineer</span>');
    await sleep(60);  blank();
    await sleep(100); line('Type <span class="bold">help</span> to see available commands.', 'white');
    await sleep(40);  blank();

    inputRow.style.display = 'flex';
    cmd.focus();
  }

  /* ── Prompt echo ── */
  function echoCmd(text) {
    const row = document.createElement('div');
    row.style.display = 'flex';
    row.innerHTML =
      `<span class="prompt"><span class="p-user">ian</span><span class="p-sep">@</span>` +
      `<span class="p-host">portfolio</span><span class="p-path">:~</span><span class="p-sym">$ </span></span>` +
      `<span class="line">${esc(text)}</span>`;
    appendNode(row);
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ── Commands ── */
  const COMMANDS = {

    help() {
      blank();
      line('<span class="bold">Commands</span>');
      blank();
      line('  <span class="blue">about</span>      who is this guy?');
      line('  <span class="blue">contact</span>    links &amp; ways to reach me');
      line('  <span class="blue">projects</span>   things i\'m building');
      line('  <span class="blue">ian</span>        see what i look like');
      line('  <span class="blue">clear</span>      clear the terminal');
      blank();
    },

    about() {
      blank();
      line('<span class="bold">Ian Laird</span>  <span class="dim">— Software Engineer</span>');
      blank();
      line('  Software engineer with 6 years of experience scaling distributed', 'white');
      line('  systems at Google and Capital One. Equally comfortable designing', 'white');
      line('  high-throughput APIs, launching ML models into production, and', 'white');
      line('  driving alignment across teams to ship complex multi-quarter', 'white');
      line('  initiatives.', 'white');
      blank();
      line('  Type <span class="blue">contact</span> to connect.', 'dim');
      blank();
    },

    contact() {
      blank();
      line('<span class="bold">Connect with me</span>');
      blank();

      const wrap = document.createElement('div');
      wrap.className = 'cards';

      const links = [
        {
          label: 'GitHub',
          href:  'https://github.com/i-laird',
          svg:   `<svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>`
        },
        {
          label: 'LinkedIn',
          href:  'https://linkedin.com/in/ianclaird',
          svg:   `<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>`
        },
        {
          label: 'Resume',
          href:  '/assets/documents/ianclaird_resume.pdf',
          target:'_blank',
          svg:   `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>`
        },
        {
          label: 'Email',
          href:  'mailto:career@ilaird.com',
          svg:   `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22 6 12 12 2 6"/></svg>`
        },
      ];

      links.forEach(({ label, href, svg, target }) => {
        const a = document.createElement('a');
        a.className = 'card';
        a.href = href;
        a.innerHTML = svg + label;
        if (target) a.target = target;
        a.rel = 'noopener noreferrer';
        wrap.appendChild(a);
      });

      appendNode(wrap);
      blank();
    },

    projects() {
      blank();
      line('<span class="bold">Projects</span>');
      blank();
      line('  🚧  <span class="blue">calculus</span>   — Derivative Calculator  (coming soon)');
      line('  🚧  <span class="blue">chess</span>      — Chess Engine           (coming soon)');
      line('  🚧  <span class="blue">sudoku</span>     — Sudoku Solver          (coming soon)');
      blank();
    },

    calculus() { COMMANDS.projects(); },
    chess()    { COMMANDS.projects(); },
    sudoku()   { COMMANDS.projects(); },

    ian() {
      blank();
      appendNode((() => {
        const pre = document.createElement('pre');
        pre.className = 'ascii';
        pre.textContent =
`          ___
         /   \\
        | o o |
         \\___/
           |
      _____|_____
     |  _______  |
     | |       | |
     | |  >_   | |
     | |_______| |
     |___________|
        |     |
     [___________]`;
        return pre;
      })());
      blank();
    },

    clear() { out.innerHTML = ''; },
  };

  /* ── Key handler ── */
  cmd.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;

    const raw   = cmd.value;
    const token = raw.trim().toLowerCase();
    cmd.value   = '';

    echoCmd(raw);

    if (token === '') {
      blank();
      return;
    }

    if (COMMANDS[token]) {
      COMMANDS[token]();
    } else {
      blank();
      line(`bash: ${esc(token)}: command not found — try <span class="blue">help</span>`, 'err');
      blank();
    }

    scroll();
  });

  boot();
</script>
</body>
</html>
