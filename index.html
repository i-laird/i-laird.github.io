<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ian Laird</title>
  <meta name="description" content="Ian Laird — Software Engineer">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:       #00ff41;
      --green-dim:   #00802b;
      --green-bright:#7fff8f;
      --blue:        #4fc3f7;
      --red:         #ff5555;
      --white:       #d0d0d0;
      --bg:          #0a0e0a;
      --bar:         #141814;
      --border:      #1e261e;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--green);
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      line-height: 1.55;
    }

    /* ── CRT scanlines ── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        180deg,
        transparent 0px, transparent 2px,
        rgba(0,0,0,.06) 2px, rgba(0,0,0,.06) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* ── Outer window ── */
    .window {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    /* ── Title bar ── */
    .titlebar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 16px;
      background: var(--bar);
      border-bottom: 1px solid var(--border);
      user-select: none;
    }

    .dot { width: 13px; height: 13px; border-radius: 50%; }
    .dot.r { background: #ff5f57; }
    .dot.y { background: #febc2e; }
    .dot.g { background: #28c840; }

    .titlebar-label {
      flex: 1;
      text-align: center;
      color: #555;
      font-size: 12px;
      letter-spacing: .04em;
    }

    /* ── Terminal body ── */
    .terminal {
      flex: 1;
      overflow-y: auto;
      padding: 18px 22px 12px;
      cursor: text;
      scroll-behavior: smooth;
    }

    .terminal::-webkit-scrollbar { width: 6px; }
    .terminal::-webkit-scrollbar-track { background: transparent; }
    .terminal::-webkit-scrollbar-thumb { background: var(--green-dim); border-radius: 3px; }

    /* ── Output lines ── */
    .line { display: block; white-space: pre-wrap; word-break: break-word; margin: 0; }
    .line + .line { margin-top: 1px; }
    .dim   { color: var(--green-dim); }
    .white { color: var(--white); }
    .bold  { color: var(--green-bright); font-weight: bold; }
    .blue  { color: var(--blue); }
    .err   { color: var(--red); }

    pre.ascii {
      color: var(--green);
      font-size: 16px;
      line-height: 1.3;
      white-space: pre;
      letter-spacing: .05em;
    }

    /* ── Input row ── */
    .input-row {
      display: flex;
      align-items: center;
      margin-top: 4px;
    }

    .prompt { white-space: nowrap; }
    .p-user { color: var(--green-bright); }
    .p-sep  { color: #444; }
    .p-host { color: var(--blue); }
    .p-path { color: #555; }
    .p-sym  { color: var(--green); }

    #cmd {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--green);
      font: inherit;
      caret-color: var(--green);
      min-width: 0;
    }

    /* ── Link cards ── */
    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 10px 0 6px;
    }

    .card {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
      color: var(--green);
      border: 1px solid var(--green-dim);
      padding: 7px 16px;
      border-radius: 3px;
      font: inherit;
      font-size: 14px;
      transition: background .12s, color .12s, border-color .12s;
      background: transparent;
      cursor: pointer;
    }

    .card:hover {
      background: var(--green);
      color: var(--bg);
      border-color: var(--green);
    }

    .card svg { flex-shrink: 0; }

    @media (max-width: 540px) {
      pre.ascii { font-size: 7px; }
      .terminal { padding: 12px 14px 10px; }
      body { font-size: 13px; }
    }
  </style>
</head>
<body>

<div class="window">
  <div class="titlebar">
    <div class="dot r"></div>
    <div class="dot y"></div>
    <div class="dot g"></div>
    <div class="titlebar-label">ian@portfolio — bash — 80×24</div>
    <div style="width:43px"></div><!-- balance -->
  </div>

  <div class="terminal" id="terminal" onclick="focusCmd()">
    <div id="out"></div>
    <div class="input-row" id="input-row" style="display:none">
      <span class="prompt">
        <span class="p-user">ian</span><span class="p-sep">@</span><span class="p-host">portfolio</span><span class="p-path">:~</span><span class="p-sym">$ </span>
      </span>
      <input id="cmd" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>
  </div>
</div>

<script>
  const out      = document.getElementById('out');
  const inputRow = document.getElementById('input-row');
  const cmd      = document.getElementById('cmd');
  const terminal = document.getElementById('terminal');

  function focusCmd() { cmd.focus(); }
  function scroll() { terminal.scrollTop = terminal.scrollHeight; }

  /* ── Append helpers ── */
  function line(html = '', cls = '') {
    const el = document.createElement('span');
    el.className = 'line' + (cls ? ' ' + cls : '');
    el.innerHTML = html;
    out.appendChild(el);
    scroll();
    return el;
  }

  function blank() { line(''); }

  function appendNode(node) { out.appendChild(node); scroll(); }

  /* ── Boot sequence ── */
  async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  async function boot() {
    await sleep(120);
    appendNode((() => {
      const pre = document.createElement('pre');
      pre.className = 'ascii';
      pre.textContent =
`  ╔══════════════════════════╗
  ║        IAN  LAIRD        ║
  ╚══════════════════════════╝`;
      return pre;
    })());

    await sleep(60);  blank();
    await sleep(80);  line('<span class="white">Software Engineer</span>');
    await sleep(60);  blank();
    await sleep(100); line('Type <span class="bold">help</span> to see available commands.', 'white');
    await sleep(40);  blank();

    inputRow.style.display = 'flex';
    cmd.focus();
  }

  /* ── Prompt echo ── */
  function echoCmd(text) {
    const row = document.createElement('div');
    row.style.display = 'flex';
    row.innerHTML =
      `<span class="prompt"><span class="p-user">ian</span><span class="p-sep">@</span>` +
      `<span class="p-host">portfolio</span><span class="p-path">:~</span><span class="p-sym">$ </span></span>` +
      `<span class="line">${esc(text)}</span>`;
    appendNode(row);
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ── Commands ── */
  const COMMANDS = {

    'gui'() {
      blank();

      function launchXP() {
        cmd.blur();

        const xp = document.createElement('div');
        xp.style.cssText = `
          position:fixed;inset:0;z-index:500;
          font-family:Tahoma,Arial,sans-serif;font-size:12px;
          background:linear-gradient(180deg,#1e72c8 0%,#4aa3e8 38%,#86c8f5 53%,#86c8f5 54%,#5bba48 57%,#4aaa38 68%,#3a8a28 100%);
          overflow:hidden;opacity:0;transition:opacity 0.8s;user-select:none;
        `;

        // rolling hills
        const hills = document.createElement('div');
        hills.style.cssText = `
          position:absolute;bottom:40px;left:-15%;right:-15%;height:48%;
          background:linear-gradient(180deg,#5bba48 0%,#4aaa38 40%,#3a8028 100%);
          border-radius:50% 50% 0 0/100% 100% 0 0;pointer-events:none;
        `;
        xp.appendChild(hills);

        // desktop area
        const desktop = document.createElement('div');
        desktop.style.cssText = 'position:absolute;inset:0;bottom:40px;';
        xp.appendChild(desktop);

        // icons
        const iconData = [
          { emoji:'📄', label:'Resume.pdf',  url:'/assets/documents/ianclaird_resume.pdf', newTab:true  },
          { emoji:'🐙', label:'My GitHub',   url:'https://github.com/i-laird',             newTab:true  },
          { emoji:'💼', label:'LinkedIn',    url:'https://linkedin.com/in/ianclaird',       newTab:true  },
          { emoji:'📧', label:'Email Ian',   url:'mailto:career@ilaird.com',                newTab:false },
          { emoji:'🗑️', label:'Recycle Bin', url:null },
          { emoji:'🥊', label:'Stick Fighter\n2000.exe', action: openStickFighter },
        ];

        iconData.forEach((data, idx) => {
          const icon = document.createElement('div');
          icon.style.cssText = `
            position:absolute;top:${14 + idx * 86}px;left:14px;width:72px;
            display:flex;flex-direction:column;align-items:center;gap:3px;
            padding:4px 4px 6px;cursor:pointer;color:white;text-align:center;
            border:1px dotted transparent;border-radius:2px;
          `;
          icon.innerHTML = `<span style="font-size:30px;line-height:1.2">${data.emoji}</span>`+
            `<span style="font-size:11px;text-shadow:1px 1px 3px #000,0 0 6px #000;word-break:break-word">${data.label}</span>`;

          let lastClick = 0;
          icon.addEventListener('click', e => {
            e.stopPropagation();
            desktop.querySelectorAll('[data-sel]').forEach(el => {
              delete el.dataset.sel; el.style.background=''; el.style.borderColor='transparent';
            });
            icon.dataset.sel = '1';
            icon.style.background = 'rgba(49,106,197,0.5)';
            icon.style.borderColor = 'rgba(200,220,255,0.7)';
            const now = Date.now();
            if (now - lastClick < 380) {
              if (data.action) data.action();
              else if (data.url) {
                if (data.newTab) window.open(data.url, '_blank');
                else window.location.href = data.url;
              }
            }
            lastClick = now;
          });
          desktop.appendChild(icon);
        });

        desktop.addEventListener('click', () => {
          desktop.querySelectorAll('[data-sel]').forEach(el => {
            delete el.dataset.sel; el.style.background=''; el.style.borderColor='transparent';
          });
        });

        // taskbar
        const taskbar = document.createElement('div');
        taskbar.style.cssText = `
          position:absolute;bottom:0;left:0;right:0;height:40px;
          background:linear-gradient(180deg,#3c7fd4 0%,#245ec0 45%,#1e54b8 50%,#2a66cc 100%);
          border-top:2px solid #5090e8;display:flex;align-items:center;
          padding:0 4px;z-index:10;box-shadow:0 -2px 8px rgba(0,0,0,0.4);
        `;

        const startBtn = document.createElement('div');
        startBtn.innerHTML = '<span style="font-size:15px">⊞</span>&nbsp;<b>start</b>';
        startBtn.style.cssText = `
          height:34px;padding:0 14px 0 10px;
          background:linear-gradient(180deg,#62c44a 0%,#3ea828 40%,#308a20 55%,#4ab838 100%);
          border:1px solid #1a6a10;border-radius:0 16px 16px 0;
          color:white;font-size:14px;cursor:pointer;
          display:flex;align-items:center;gap:6px;
          text-shadow:1px 1px 2px rgba(0,0,0,0.6);
          box-shadow:inset 0 1px rgba(255,255,255,0.3);
        `;

        const clock = document.createElement('div');
        clock.style.cssText = `
          margin-left:auto;color:white;font-size:11px;padding:2px 10px;text-align:center;
          text-shadow:1px 1px 2px rgba(0,0,0,0.5);background:rgba(0,0,0,0.15);
          border:1px solid rgba(255,255,255,0.15);height:30px;
          display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
        `;
        const tickClock = () => {
          const n = new Date();
          clock.innerHTML =
            '<span>' + n.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) + '</span>' +
            '<span style="font-size:10px">' + n.toLocaleDateString([],{month:'short',day:'numeric'}) + '</span>';
        };
        tickClock();
        const clockId = setInterval(tickClock, 1000);

        taskbar.appendChild(startBtn);
        taskbar.appendChild(clock);
        xp.appendChild(taskbar);

        // start menu
        const menu = document.createElement('div');
        menu.style.cssText = `
          position:absolute;bottom:40px;left:0;width:260px;background:white;
          border:1px solid #6688cc;box-shadow:4px 0 8px rgba(0,0,0,0.4),0 -2px 8px rgba(0,0,0,0.3);
          display:none;z-index:20;border-radius:0 8px 0 0;overflow:hidden;
        `;

        const mHead = document.createElement('div');
        mHead.style.cssText = `background:linear-gradient(90deg,#1e5ab8,#4a8ae8);padding:10px 14px;
          color:white;font-size:15px;font-weight:bold;display:flex;align-items:center;gap:10px;`;
        mHead.innerHTML = '<span style="font-size:26px">👤</span>Ian Laird';
        menu.appendChild(mHead);

        const mList = document.createElement('div');
        mList.style.cssText = 'padding:4px 0;';
        [
          { emoji:'📄', label:'Resume',           url:'/assets/documents/ianclaird_resume.pdf', newTab:true  },
          { emoji:'🐙', label:'GitHub',            url:'https://github.com/i-laird',             newTab:true  },
          { emoji:'💼', label:'LinkedIn',          url:'https://linkedin.com/in/ianclaird',       newTab:true  },
          { emoji:'📧', label:'Email',             url:'mailto:career@ilaird.com',                newTab:false },
          null,
          { emoji:'↩️', label:'Back to Terminal',  action: shutdown },
        ].forEach(item => {
          if (!item) {
            const sep = document.createElement('div');
            sep.style.cssText = 'height:1px;background:#ddd;margin:3px 0;';
            mList.appendChild(sep); return;
          }
          const el = document.createElement('div');
          el.style.cssText = 'display:flex;align-items:center;gap:10px;padding:6px 14px;cursor:pointer;font-size:13px;';
          el.innerHTML = `<span style="font-size:18px">${item.emoji}</span>${item.label}`;
          el.addEventListener('mouseover', () => { el.style.background='#316ac5'; el.style.color='white'; });
          el.addEventListener('mouseout',  () => { el.style.background=''; el.style.color=''; });
          el.addEventListener('click', () => {
            toggleMenu(false);
            if (item.action) { item.action(); return; }
            if (item.newTab) window.open(item.url, '_blank');
            else window.location.href = item.url;
          });
          mList.appendChild(el);
        });
        menu.appendChild(mList);
        xp.appendChild(menu);

        let menuOpen = false;
        function toggleMenu(open) {
          menuOpen = open !== undefined ? open : !menuOpen;
          menu.style.display = menuOpen ? 'block' : 'none';
        }
        startBtn.addEventListener('click', e => { e.stopPropagation(); toggleMenu(); });
        xp.addEventListener('click', () => toggleMenu(false));

        // ── Stick Fighter 2000 ──────────────────────────────────────
        let sfCleanup = null;

        function openStickFighter() {
          if (document.getElementById('sf-canvas')) { sfCleanup && sfCleanup(); return; }

          const GW = xp.offsetWidth;
          const GH = xp.offsetHeight - 40;

          // transparent canvas over the whole desktop
          const canvas = document.createElement('canvas');
          canvas.id = 'sf-canvas';
          canvas.width = GW; canvas.height = GH;
          canvas.style.cssText = 'position:absolute;left:0;top:0;width:100%;height:calc(100% - 40px);pointer-events:none;z-index:5;';
          xp.appendChild(canvas);

          // small HUD pinned to top-right
          const hud = document.createElement('div');
          hud.style.cssText = `
            position:absolute;top:8px;right:8px;z-index:6;pointer-events:none;
            background:rgba(0,0,0,0.45);color:white;font-size:12px;
            padding:5px 10px;border-radius:4px;text-shadow:1px 1px 2px #000;
            font-family:Tahoma,Arial,sans-serif;line-height:1.6;
          `;
          hud.innerHTML = 'WASD / arrows to move<br>double-click icon to stop';
          xp.appendChild(hud);

          const ctx = canvas.getContext('2d');
          let player, enemies, score, alive, frameCount, keys, rafId, scoreTimer;

          function stickFigure(x, y, phase, color) {
            ctx.save();
            ctx.translate(x, y);
            ctx.strokeStyle = color;
            ctx.lineWidth = 2.5;
            ctx.lineCap = 'round';
            const s = Math.sin(phase);
            ctx.beginPath(); ctx.arc(0,-34,8,0,Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,-26); ctx.lineTo(0,-6); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,-20); ctx.lineTo(-14,-20+s*8); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,-20); ctx.lineTo( 14,-20-s*8); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,-6);  ctx.lineTo(-10,-6+18+s*10); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,-6);  ctx.lineTo( 10,-6+18-s*10); ctx.stroke();
            ctx.restore();
          }

          function init() {
            player = {x:GW/2, y:GH/2, phase:0};
            enemies = []; score = 0; alive = true; frameCount = 0; keys = {};
            if (scoreTimer) clearInterval(scoreTimer);
            scoreTimer = setInterval(() => { if (alive) score++; }, 1000);
          }

          function spawnEnemy() {
            const side = Math.floor(Math.random()*4);
            let x, y;
            if      (side===0){ x=Math.random()*GW; y=-40;    }
            else if (side===1){ x=GW+40;             y=Math.random()*GH; }
            else if (side===2){ x=Math.random()*GW; y=GH+40;  }
            else               { x=-40;               y=Math.random()*GH; }
            enemies.push({x, y, phase:Math.random()*Math.PI*2});
          }

          function loop() {
            if (!alive) return;
            frameCount++;

            let dx=0, dy=0;
            if (keys['ArrowLeft'] ||keys['a']||keys['A']) dx=-1;
            if (keys['ArrowRight']||keys['d']||keys['D']) dx= 1;
            if (keys['ArrowUp']   ||keys['w']||keys['W']) dy=-1;
            if (keys['ArrowDown'] ||keys['s']||keys['S']) dy= 1;
            if (dx&&dy){ dx*=0.707; dy*=0.707; }
            player.x = Math.max(12, Math.min(GW-12, player.x + dx*3));
            player.y = Math.max(12, Math.min(GH-12, player.y + dy*3));
            if (dx||dy) player.phase += 0.25;

            const spawnEvery = Math.max(45, 110 - Math.floor(score/8)*8);
            if (frameCount % spawnEvery === 0) spawnEnemy();

            const espd = 1.3 + score * 0.012;
            for (const e of enemies) {
              const ex=player.x-e.x, ey=player.y-e.y, d=Math.sqrt(ex*ex+ey*ey);
              if (d>0){ e.x+=ex/d*espd; e.y+=ey/d*espd; }
              e.phase += 0.2;
              if (d<20){ alive=false; clearInterval(scoreTimer); drawDead(); return; }
            }

            ctx.clearRect(0, 0, GW, GH);
            hud.innerHTML = 'SCORE: ' + score + '<br>ENEMIES: ' + enemies.length;
            for (const e of enemies) stickFigure(e.x, e.y, e.phase, '#1a0000');
            stickFigure(player.x, player.y, player.phase, 'white');

            rafId = requestAnimationFrame(loop);
          }

          function drawDead() {
            ctx.clearRect(0, 0, GW, GH);
            ctx.fillStyle = 'rgba(0,0,0,0.45)';
            ctx.fillRect(0, 0, GW, GH);
            ctx.fillStyle = 'white'; ctx.textAlign = 'center';
            ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=8;
            ctx.font='bold 36px Tahoma,Arial'; ctx.fillText('YOU DIED', GW/2, GH/2-20);
            ctx.font='18px Tahoma,Arial';      ctx.fillText('Score: '+score, GW/2, GH/2+14);
            ctx.font='13px Tahoma,Arial';      ctx.fillText('press R to play again', GW/2, GH/2+44);
            ctx.shadowBlur=0; ctx.textAlign='left';
            hud.innerHTML = 'press R to play again';
          }

          function stopGame() {
            alive = false;
            if (rafId) cancelAnimationFrame(rafId);
            if (scoreTimer) clearInterval(scoreTimer);
            document.removeEventListener('keydown', onKey);
            document.removeEventListener('keyup',   offKey);
            canvas.remove(); hud.remove(); sfCleanup = null;
          }

          function onKey(e) {
            keys[e.key] = true;
            if (e.key==='r'||e.key==='R') { if (!alive) { init(); loop(); } }
            if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
          }
          function offKey(e){ keys[e.key]=false; }
          document.addEventListener('keydown', onKey);
          document.addEventListener('keyup',   offKey);

          init(); loop();
          sfCleanup = stopGame;
        }
        // ────────────────────────────────────────────────────────────

        function shutdown() {
          if (sfCleanup) { sfCleanup(); sfCleanup = null; }
          clearInterval(clockId);
          document.removeEventListener('keydown', escHandler);
          xp.style.transition = 'opacity 0.5s';
          xp.style.opacity = '0';
          setTimeout(() => { xp.remove(); cmd.focus(); }, 500);
        }
        function escHandler(e) { if (e.key === 'Escape') shutdown(); }
        document.addEventListener('keydown', escHandler);

        document.body.appendChild(xp);
        requestAnimationFrame(() => requestAnimationFrame(() => { xp.style.opacity = '1'; }));
      }

      launchXP();
    },

    agi() {
      blank();
      const title = document.querySelector('.titlebar-label');
      title.textContent = 'idk about this one';

      // flash + crack at 500ms
      setTimeout(() => {
        const flash = document.createElement('div');
        flash.style.cssText = 'position:fixed;inset:0;background:rgba(255,255,255,0.18);z-index:200;pointer-events:none;transition:opacity 0.25s';
        document.body.appendChild(flash);
        setTimeout(() => flash.remove(), 250);

        const crack = document.createElement('div');
        crack.style.cssText = 'position:fixed;inset:0;z-index:150;pointer-events:none';
        crack.innerHTML = `<svg viewBox="0 0 100 100" preserveAspectRatio="none" width="100%" height="100%">
          <polyline points="38,0 35,10 42,22 30,38 44,55 24,70 38,85 30,100"
            stroke="white" stroke-width="0.55" fill="none" stroke-opacity="0.9"/>
          <polyline points="35,10 58,16 74,28"
            stroke="white" stroke-width="0.3" fill="none" stroke-opacity="0.7"/>
          <polyline points="42,22 52,18 60,8"
            stroke="white" stroke-width="0.2" fill="none" stroke-opacity="0.5"/>
          <polyline points="30,38 14,44 6,52"
            stroke="white" stroke-width="0.3" fill="none" stroke-opacity="0.65"/>
          <polyline points="44,55 64,60 80,68"
            stroke="white" stroke-width="0.3" fill="none" stroke-opacity="0.6"/>
          <polyline points="74,28 82,22 92,30"
            stroke="white" stroke-width="0.2" fill="none" stroke-opacity="0.45"/>

    racecar() {
      const W = 52, LANES = 3, CAR_X = 2;
      const CAR  = '>>=[O]==>>'; // 10 chars
      const CAR_W = CAR.length;
      const SYMS = ['@','#','$','%','&','*','!','?','^'];

      let lane = 1, score = 0, frames = 0;
      let obs = [], alive = false, ded = false;

      // build game container
      const wrap   = document.createElement('div');
      const screen = document.createElement('pre');
      const hint   = document.createElement('span');
      screen.className = 'ascii';
      screen.style.cssText = 'font-size:13px;line-height:1.5;color:var(--green)';
      hint.className = 'line dim';
      hint.textContent = '  [arrow keys] change lane    [q] quit';
      wrap.appendChild(screen);
      wrap.appendChild(hint);
      appendNode(wrap);
      blank();

      inputRow.style.display = 'none';

      const DIV = ('- ').repeat(W / 2);
      const BAR = '\u2550'.repeat(W);

      function draw() {
        if (!alive && !ded) {
          screen.textContent = [
            '',
            "  .--------------------------------.",
            "  |      R A C E C A R  v0.1      |",
            "  |   dodge the symbols. don't    |",
            "  |   crash. probably will crash. |",
            "  '--------------------------------'",
            '',
            '  press any key to start',
            '',
          ].join('\n');
          return;
        }
        if (ded) {
          screen.textContent = [
            '',
            '      X_X    u crashed lol',
            '',
            '      score: ' + score,
            score > 50  ? '      not bad actually' :
            score > 20  ? '      could be worse' :
                          '      yikes',
            '',
            '      [r] try again    [q] quit',
            '',
          ].join('\n');
          return;
        }

        const rows = Array.from({length: LANES}, (_, l) => {
          const row = Array(W).fill(' ');
          if (l === lane) {
            for (let i = 0; i < CAR_W; i++) {
              if (CAR_X + i < W) row[CAR_X + i] = CAR[i];
            }
          }
          for (const o of obs) {
            if (o.lane === l && o.x >= 0 && o.x < W) row[o.x] = o.char;
          }
          return row.join('');
        });

        screen.textContent =
          ' SCORE: ' + String(score).padStart(4, '0') + '\n' +
          ' ' + BAR + '\n' +
          ' ' + rows[0] + '\n' +
          ' ' + DIV    + '\n' +
          ' ' + rows[1] + '\n' +
          ' ' + DIV    + '\n' +
          ' ' + rows[2] + '\n' +
          ' ' + BAR;
      }

      function tick() {
        if (!alive) return;
        frames++;
        score = Math.floor(frames / 8);

        for (const o of obs) o.x--;
        obs = obs.filter(o => o.x >= 0);

        const interval = Math.max(18 - Math.floor(score / 15), 7);
        if (frames % interval === 0) {
          // never block all 3 lanes at same x
          const count = Math.random() < 0.35 ? 2 : 1;
          const blocked = new Set();
          while (blocked.size < Math.min(count, LANES - 1)) {
            blocked.add(Math.floor(Math.random() * LANES));
          }
          for (const l of blocked) {
            obs.push({ lane: l, x: W - 1, char: SYMS[Math.floor(Math.random() * SYMS.length)] });
          }
        }

        for (const o of obs) {
          if (o.lane === lane && o.x >= CAR_X && o.x < CAR_X + CAR_W) {
            alive = false; ded = true; draw(); return;
          }
        }

        draw();
        setTimeout(tick, 90);
      }

      function start() {
        lane = 1; score = 0; frames = 0; obs = [];
        alive = true; ded = false;
        draw();
        setTimeout(tick, 90);
      }

      function end() {
        alive = false;
        window.removeEventListener('keydown', keyHandler);
        inputRow.style.display = 'flex';
        cmd.focus();
      }

      function keyHandler(e) {
        if (ded) {
          if (e.key === 'r') { start(); return; }
          if (e.key === 'q') { end(); return; }
          return;
        }
        if (!alive) {
          if (e.key === 'q') { end(); return; }
          start(); return;
        }
        if (e.key === 'ArrowUp'   && lane > 0)          { lane--; e.preventDefault(); }
        if (e.key === 'ArrowDown' && lane < LANES - 1)  { lane++; e.preventDefault(); }
        if (e.key === 'q') { alive = false; ded = true; draw(); }
      }

      window.addEventListener('keydown', keyHandler);
      draw();
    },

    ian() {
      blank();

      const bubble = [
        '   .------------------------.',
        '   | Real Ian uses Zshell!  |',
        "   '------------------------'",

      ];
      const figure = [

      function render(offset, showBubble) {

      render(0, true);

      // after 1.4s drop the bubble and run
      setTimeout(() => {

          offset += 4;
          if (offset > 80) {

    },

    snake() {
      const COLS = 35, ROWS = 20;

      let snake, dir, nextDir, food, score, alive, ded;

      const wrap   = document.createElement('div');
      const screen = document.createElement('pre');
      const hint   = document.createElement('span');
      screen.className = 'ascii';
      screen.style.cssText = 'font-size:13px;line-height:1.35;color:var(--green)';
      hint.className = 'line dim';
      hint.textContent = '  [arrow keys / wasd] move    [q] quit';
      wrap.appendChild(screen);
      wrap.appendChild(hint);
      appendNode(wrap);
      blank();

      inputRow.style.display = 'none';

      function placeFood() {
        const taken = new Set(snake.map(s => s.x + ',' + s.y));
        let fx, fy;
        do {
          fx = Math.floor(Math.random() * COLS);
          fy = Math.floor(Math.random() * ROWS);
        } while (taken.has(fx + ',' + fy));
        food = {x: fx, y: fy};
      }

      function draw() {
        if (!alive && !ded) {
          screen.textContent = [
            '',
            '  .-----------------------------.',
            '  |        S N A K E           |',
            '  |   eat the stars (*).       |',
            "  |   don't hit the walls.     |",
            "  |   don't hit yourself.      |",
            "  '-----------------------------'",
            '',
            '  press any key to start',
            '',
          ].join('\n');
          return;
        }
        if (ded) {
          screen.textContent = [
            '',
            '  x_x  you died.',
            '',
            '  score: ' + score,
            score >= 15 ? '  ok that was pretty good' :
            score >= 5  ? '  not terrible' :
                          '  rough out there',
            '',
            '  [r] again    [q] quit',
            '',
          ].join('\n');
          return;
        }

        const grid = Array.from({length: ROWS}, () => Array(COLS).fill(' '));
        grid[food.y][food.x] = '*';
        snake.forEach((s, i) => {
          if (s.x >= 0 && s.x < COLS && s.y >= 0 && s.y < ROWS)
            grid[s.y][s.x] = i === 0 ? '@' : 'o';
        });

        const top = '+' + '-'.repeat(COLS) + '+';
        screen.textContent =
          ' SCORE: ' + String(score).padStart(3, '0') + '\n' +
          ' ' + top + '\n' +
          grid.map(row => ' |' + row.join('') + '|').join('\n') + '\n' +
          ' ' + top;
      }

      function tick() {
        if (!alive) return;
        dir = nextDir;
        const head = {x: snake[0].x + dir.dx, y: snake[0].y + dir.dy};

        if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
            snake.some(s => s.x === head.x && s.y === head.y)) {
          alive = false; ded = true; draw(); return;
        }

        snake.unshift(head);
        if (head.x === food.x && head.y === food.y) {
          score++;
          placeFood();
        } else {
          snake.pop();
        }

        draw();
        const speed = Math.max(75, 150 - Math.floor(score / 3) * 10);
        setTimeout(tick, speed);
      }

      function start() {
        snake    = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
        dir      = {dx:1, dy:0};
        nextDir  = {dx:1, dy:0};
        score    = 0;
        alive    = true;
        ded      = false;
        placeFood();
        draw();
        setTimeout(tick, 150);
      }

      function end() {
        alive = false;
        window.removeEventListener('keydown', keyHandler);
        inputRow.style.display = 'flex';
        cmd.focus();
      }

      const DIRS = {
        ArrowUp:    {dx:0,  dy:-1}, w: {dx:0,  dy:-1},
        ArrowDown:  {dx:0,  dy:1},  s: {dx:0,  dy:1},
        ArrowLeft:  {dx:-1, dy:0},  a: {dx:-1, dy:0},
        ArrowRight: {dx:1,  dy:0},  d: {dx:1,  dy:0},
      };

      function keyHandler(e) {
        if (ded) {
          if (e.key === 'r') { start(); return; }
          if (e.key === 'q') { end();   return; }
          return;
        }
        if (!alive) {
          if (e.key === 'q') { end(); return; }
          start(); return;
        }
        const d = DIRS[e.key];
        if (d) {
          if (d.dx !== -dir.dx || d.dy !== -dir.dy) nextDir = d;
          e.preventDefault();
        }
        if (e.key === 'q') { alive = false; ded = true; draw(); }
      }

      window.addEventListener('keydown', keyHandler);
      draw();
    },

    clear() { out.innerHTML = ''; },
  };

  /* ── Key handler ── */
  cmd.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;

    const raw   = cmd.value;
    const token = raw.trim().toLowerCase();
    cmd.value   = '';

    echoCmd(raw);

    if (token === '') {
      blank();
      return;
    }

    if (COMMANDS[token]) {
      COMMANDS[token]();
    } else {
      blank();
      line(`bash: ${esc(token)}: command not found — try <span class="blue">help</span>`, 'err');
      blank();
    }

    scroll();
  });

  boot();
