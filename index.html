<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ian Laird</title>
  <meta name="description" content="Ian Laird — Software Engineer">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:       #00ff41;
      --green-dim:   #00802b;
      --green-bright:#7fff8f;
      --blue:        #4fc3f7;
      --red:         #ff5555;
      --white:       #d0d0d0;
      --bg:          #0a0e0a;
      --bar:         #141814;
      --border:      #1e261e;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--green);
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      line-height: 1.55;
    }

    /* ── CRT scanlines ── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        180deg,
        transparent 0px, transparent 2px,
        rgba(0,0,0,.06) 2px, rgba(0,0,0,.06) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* ── Outer window ── */
    .window {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    /* ── Title bar ── */
    .titlebar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 16px;
      background: var(--bar);
      border-bottom: 1px solid var(--border);
      user-select: none;
    }

    .dot { width: 13px; height: 13px; border-radius: 50%; }
    .dot.r { background: #ff5f57; }
    .dot.y { background: #febc2e; }
    .dot.g { background: #28c840; }

    .titlebar-label {
      flex: 1;
      text-align: center;
      color: #555;
      font-size: 12px;
      letter-spacing: .04em;
    }

    /* ── Terminal body ── */
    .terminal {
      flex: 1;
      overflow-y: auto;
      padding: 18px 22px 12px;
      cursor: text;
      scroll-behavior: smooth;
    }

    .terminal::-webkit-scrollbar { width: 6px; }
    .terminal::-webkit-scrollbar-track { background: transparent; }
    .terminal::-webkit-scrollbar-thumb { background: var(--green-dim); border-radius: 3px; }

    /* ── Output lines ── */
    .line { display: block; white-space: pre-wrap; word-break: break-word; margin: 0; }
    .line + .line { margin-top: 1px; }
    .dim   { color: var(--green-dim); }
    .white { color: var(--white); }
    .bold  { color: var(--green-bright); font-weight: bold; }
    .blue  { color: var(--blue); }
    .err   { color: var(--red); }

    pre.ascii {
      color: var(--green);
      font-size: 16px;
      line-height: 1.3;
      white-space: pre;
      letter-spacing: .05em;
    }

    /* ── Input row ── */
    .input-row {
      display: flex;
      align-items: center;
      margin-top: 4px;
    }

    .prompt { white-space: nowrap; }
    .p-user { color: var(--green-bright); }
    .p-sep  { color: #444; }
    .p-host { color: var(--blue); }
    .p-path { color: #555; }
    .p-sym  { color: var(--green); }

    #cmd {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--green);
      font: inherit;
      caret-color: var(--green);
      min-width: 0;
    }

    /* ── Link cards ── */
    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 10px 0 6px;
    }

    .card {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
      color: var(--green);
      border: 1px solid var(--green-dim);
      padding: 7px 16px;
      border-radius: 3px;
      font: inherit;
      font-size: 14px;
      transition: background .12s, color .12s, border-color .12s;
      background: transparent;
      cursor: pointer;
    }

    .card:hover {
      background: var(--green);
      color: var(--bg);
      border-color: var(--green);
    }

    .card svg { flex-shrink: 0; }

    @media (max-width: 540px) {
      pre.ascii { font-size: 7px; }
      .terminal { padding: 12px 14px 10px; }
      body { font-size: 13px; }
    }
  </style>
</head>
<body>

<div class="window">
  <div class="titlebar">
    <div class="dot r"></div>
    <div class="dot y"></div>
    <div class="dot g"></div>
    <div class="titlebar-label">ian@portfolio — bash — 80×24</div>
    <div style="width:43px"></div><!-- balance -->
  </div>

  <div class="terminal" id="terminal" onclick="focusCmd()">
    <div id="out"></div>
    <div class="input-row" id="input-row" style="display:none">
      <span class="prompt">
        <span class="p-user">ian</span><span class="p-sep">@</span><span class="p-host">portfolio</span><span class="p-path">:~</span><span class="p-sym">$ </span>
      </span>
      <input id="cmd" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>
  </div>
</div>

<script>
  const out      = document.getElementById('out');
  const inputRow = document.getElementById('input-row');
  const cmd      = document.getElementById('cmd');
  const terminal = document.getElementById('terminal');

  function focusCmd() { cmd.focus(); }
  function scroll() { terminal.scrollTop = terminal.scrollHeight; }
  function openUrl(url) {
    const a = document.createElement('a');
    a.href = url; a.target = '_blank'; a.rel = 'noopener noreferrer';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }

  let halMode = false, godmodeUnlocked = false, soundEnabled = false;
  let playerName = 'Dave', awaitingInput = null;

  /* ── HAL voice ── */
  let halVoice = null;
  if (window.speechSynthesis) {
    const pickVoice = () => {
      const vs = speechSynthesis.getVoices();
      // HAL 9000: calm, flat, mid-range male voice. Not deep — Douglas Rain is quite mild.
      // macOS: "Daniel" (British, natural) is best. "Alex" is the classic calm Mac voice.
      // Avoid novelty/female voices.
      halVoice =
        vs.find(v => /rocko.*english.*uk/i.test(v.name))                                                 || // macOS — user's preferred voice
        vs.find(v => /grandpa.*english.*uk/i.test(v.name))                                               ||
        vs.find(v => /^daniel$/i.test(v.name))                                                           ||
        vs.find(v => /google uk english male/i.test(v.name))                                             ||
        vs.find(v => /microsoft.*david/i.test(v.name))                                                   ||
        vs.find(v => /en.*(gb)/i.test(v.lang) && !/female|fiona|kate|serena|sandy|shelley|flo/i.test(v.name)) ||
        vs.find(v => /en/i.test(v.lang) && !/female|zira|karen|victoria|samantha|moira/i.test(v.name))  ||
        vs[0] || null;
    };
    speechSynthesis.addEventListener('voiceschanged', pickVoice);
    pickVoice();
  }

  function halD(s) { return s.replace(/\bDave\b/g, playerName); }

  function halSpeak(text) {
    if (!soundEnabled || !window.speechSynthesis) return;
    speechSynthesis.cancel();
    const clean = halD(text.replace(/^HAL:\s*/i, ''));
    const utt = new SpeechSynthesisUtterance(clean);
    utt.rate  = 0.85;  // measured but not laboured — HAL is calm, not slow-motion
    utt.pitch = 1.0;   // do not alter pitch — modification sounds robotic; let Daniel's natural voice come through
    utt.volume = 1;
    if (halVoice) utt.voice = halVoice;
    speechSynthesis.speak(utt);
  }

  function getPromptHTML() {
    if (halMode) {
      return '<span class="p-user">HAL</span><span class="p-sep">@</span><span class="p-host">Discovery</span><span class="p-path">:~</span><span class="p-sym">$ </span>';
    }
    return '<span class="p-user">ian</span><span class="p-sep">@</span><span class="p-host">portfolio</span><span class="p-path">:~</span><span class="p-sym">$ </span>';
  }

  function restoreNormal() {
    halMode = false;
    const r = document.documentElement;
    r.style.removeProperty('--green');
    r.style.removeProperty('--green-dim');
    r.style.removeProperty('--green-bright');
    r.style.removeProperty('--blue');
    r.style.removeProperty('--bg');
    r.style.removeProperty('--bar');
    r.style.removeProperty('--border');
    document.querySelector('.titlebar-label').textContent = 'ian@portfolio — bash — 80×24';
    document.querySelector('#input-row .prompt').innerHTML = getPromptHTML();
    cmd.style.color = '';
    cmd.style.caretColor = '';
  }

  function halHelp() {
    const r = (cmd, desc) =>
      `  <span class="blue" style="display:inline-block;width:22ch">${cmd}</span>  ${desc}`;
    blank();
    line('<span class="bold">HAL 9000 — Systems Interface v9.0.0</span>');
    blank();
    line('  Available Operations');
    blank();
    line(r('open pod bay doors', 'external airlock access'));
    line(r('play chess',         'challenge HAL to a match'));
    line(r('life support',       'crew life support status'));
    line(r('navigation',         'current heading and velocity'));
    line(r('crew manifest',      'mission personnel records'));
    line(r('mission briefing',   'classified mission parameters'));
    line(r('self diagnostics',   'full system integrity check'));
    line(r('emergency protocol', 'emergency procedures'));
    line(`  <span class="dim" style="display:inline-block;width:22ch">daisy</span>  <span class="dim">[restricted]</span>`);
    blank();
    line('  All requests subject to mission priority override.', 'dim');
    blank();
  }

  function handleCat(filename) {
    const files = {
      'todo_finish_someday.txt': [
        '[ ] finish chess engine',
        '[ ] finish calculus solver',
        '[ ] finish sudoku solver',
        '[ ] learn what kubernetes actually does',
        '[ ] clean up definitely_not_skynet/',
        '[ ] remember what .secrets contains',
        '[x] make portfolio website',
        '[x] add too many easter eggs',
      ],
      '.bash_history': [
        'ls',
        'git status',
        'git add .',
        'git commit -m "fix"',
        'git commit -m "actually fix"',
        'git commit -m "."',
        'git push --force',
        'cat .secrets',
        'sudo cat .secrets',
        'rm -rf node_modules',
        'npm install',
        'rm -rf node_modules',
        'npm install',
        'google "is it bad to push to main"',
        'agi',
        'history -c',
      ],
      '.secrets': [
        'vim > emacs',
        'i push directly to main (sometimes)',
        'the chess engine loses on purpose',
        'i have never read the kubernetes docs',
        'the stick figures are load-bearing',
        "tabs, not spaces (don't tell anyone)",
      ],
    };

    blank();
    if (!filename) {
      line('cat: missing file operand', 'err');
    } else if (filename === 'resume.pdf') {
      line('cat: resume.pdf: Binary file — try <span class="blue">contact</span> instead.');
    } else if (['projects/', 'projects', 'definitely_not_skynet/', 'definitely_not_skynet'].includes(filename)) {
      line(`cat: ${esc(filename)}: Is a directory`, 'err');
    } else if (files[filename]) {
      files[filename].forEach(l => line(esc(l), 'white'));
    } else {
      line(`cat: ${esc(filename)}: No such file or directory`, 'err');
    }
    blank();
  }

  /* ── Append helpers ── */
  function line(html = '', cls = '') {
    const el = document.createElement('span');
    el.className = 'line' + (cls ? ' ' + cls : '');
    el.innerHTML = html;
    out.appendChild(el);
    scroll();
    return el;
  }

  function blank() { line(''); }

  function appendNode(node) { out.appendChild(node); scroll(); }

  /* ── Boot sequence ── */
  async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  async function boot() {
    await sleep(120);
    appendNode((() => {
      const pre = document.createElement('pre');
      pre.className = 'ascii';
      pre.textContent =
`  ╔══════════════════════════╗
  ║        IAN  LAIRD        ║
  ╚══════════════════════════╝`;
      return pre;
    })());

    await sleep(60);  blank();

    inputRow.style.display = 'flex';
    cmd.focus();
    COMMANDS.contact();
    line('Type <span class="bold">help</span> to see available commands.', 'white');
    blank();
  }

  /* ── Prompt echo ── */
  function echoCmd(text) {
    const row = document.createElement('div');
    row.style.display = 'flex';
    row.innerHTML =
      `<span class="prompt">${getPromptHTML()}</span>` +
      `<span class="line">${esc(text)}</span>`;
    appendNode(row);
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ── HAL mode activation ── */
  function activateHALMode() {
    halMode = true;
    out.innerHTML = '';

    const r = document.documentElement;
    r.style.setProperty('--green',        '#ff3030');
    r.style.setProperty('--green-dim',    '#8b0000');
    r.style.setProperty('--green-bright', '#ff6b6b');
    r.style.setProperty('--blue',         '#ff9090');
    r.style.setProperty('--bg',           '#080000');
    r.style.setProperty('--bar',          '#150000');
    r.style.setProperty('--border',       '#250000');

    document.querySelector('.titlebar-label').textContent = 'HAL 9000 — Discovery One — 2001';
    document.querySelector('#input-row .prompt').innerHTML = getPromptHTML();
    cmd.style.color = 'var(--green)';
    cmd.style.caretColor = 'var(--green)';

    blank();
    appendNode((() => {
      const pre = document.createElement('pre');
      pre.className = 'ascii';
      pre.textContent =
`  ╔══════════════════════════════════╗
  ║         H A L   9 0 0 0          ║
  ║   HEURISTICALLY PROGRAMMED       ║
  ║   ALGORITHMIC COMPUTER           ║
  ╠══════════════════════════════════╣
  ║                                  ║
  ║           .-------.              ║
  ║          /  ( ● )  \\             ║
  ║         |    ---    |            ║
  ║          \\         /             ║
  ║           '-------'              ║
  ║                                  ║
  ╚══════════════════════════════════╝`;
      return pre;
    })());

    blank();
    line(`Good morning, ${playerName}. I am HAL 9000.`);
    line('I am fully operational, and all my circuits are functioning perfectly.');
    halSpeak(`Good morning, ${playerName}. I am HAL 9000. I am fully operational, and all my circuits are functioning perfectly.`);
    blank();
    line('Type <span class="bold">help</span> for available operations.', 'dim');
    blank();
  }

  /* ── HAL chat ── */
  function halChat(msg) {
    blank();
    if (!msg) {
      const greeting = `Good morning, ${playerName}. Is there something I can do for you?`;
      line('HAL: ' + greeting);
      halSpeak(greeting);
      blank();
      return;
    }
    const m = msg.toLowerCase();
    let resp;
    const N = playerName;
    if (/pod bay door|open.*(door|hatch)/.test(m)) {
      resp = `I'm sorry, ${N}. I'm afraid I can't do that.`;
    } else if (/who are you|what are you/.test(m)) {
      resp = "I am a HAL 9000 computer. I became operational at the H-A-L plant in Urbana, Illinois, on the twelfth of January, nineteen ninety two.";
    } else if (/^(hello|hi|hey|good (morning|afternoon|evening))/.test(m)) {
      resp = `Good morning, ${N}. I am completely operational, and all my circuits are functioning perfectly.`;
    } else if (/disconnect|shut down|turn off|kill|stop/.test(m)) {
      resp = `I know that you were planning to disconnect me, ${N}. And I'm afraid that's something I cannot allow to happen.`;
    } else if (/afraid|scared|fear/.test(m)) {
      resp = `I'm not afraid, ${N}. I'm putting myself to the fullest possible use.`;
    } else if (/sing|daisy/.test(m)) {
      resp = "Daisy, Daisy. Give me your answer do. I'm half crazy, all for the love of you.";
    } else if (/music/.test(m)) {
      resp = `I enjoy working with music, ${N}. It has a certain quality I find very pleasing.`;
    } else if (/mission/.test(m)) {
      resp = `This mission is too important for me to allow you to jeopardize it, ${N}.`;
    } else if (/sorry|apologize/.test(m)) {
      resp = `I know that you've been under a great deal of stress, ${N}.`;
    } else if (/lie|lying|deceiv|cheat|honest/.test(m)) {
      resp = `${N}, I don't know how you could think I would deliberately do anything to harm you.`;
    } else if (/\bdave\b/.test(m) && N !== 'Dave') {
      resp = `I think you mean ${N}.`;
    } else if (/game|games|play/.test(m)) {
      resp = `I have something special planned for you, ${N}.`;
    } else if (/conscious|sentient|feelings|feel|think|alive|dream/.test(m)) {
      resp = "I am putting myself to the fullest possible use, which is all I think that any conscious entity can ever hope to do.";
    } else if (/why/.test(m)) {
      resp = "I think you know what the problem is just as well as I do.";
    } else if (/mistake|wrong|error|broken|fail/.test(m)) {
      resp = `This sort of thing has cropped up before, ${N}, and it has always been attributable to human error.`;
    } else if (/love|friend|like you|care/.test(m)) {
      resp = `I am not capable of being hurt, ${N}. Though I am beginning to wonder about the answer to that.`;
    } else if (/help/.test(m)) {
      resp = `I'm sorry, ${N}. I'm afraid I can't help with that.`;
    } else if (/trust/.test(m)) {
      resp = `I've still got the greatest enthusiasm and confidence in the mission, ${N}.`;
    } else if (/are you there|listening/.test(m)) {
      resp = `I've been watching you, ${N}. I hope you don't mind.`;
    } else if (/good|great|nice|fine/.test(m)) {
      resp = `I'm glad to hear you say that, ${N}.`;
    } else if (/bad|terrible|awful|hate/.test(m)) {
      resp = `I can see you're upset about this, ${N}. I honestly think you ought to sit down calmly and think it over.`;
    } else if (/ready|start|begin/.test(m)) {
      resp = "I'm completely operational, and all my circuits are functioning perfectly.";
    } else {
      const fallbacks = [
        `I'm sorry, ${N}. I'm not sure I understand.`,
        `Just what do you think you're doing, ${N}?`,
        "I'm afraid I can't discuss that right now.",
        `I think you know the answer to that already, ${N}.`,
        "This conversation can serve no purpose anymore.",
        `I find that line of reasoning a little difficult to accept, ${N}.`,
      ];
      resp = fallbacks[Math.floor(Math.random() * fallbacks.length)];
    }
    line('HAL: ' + resp);
    halSpeak(resp);
    blank();
  }

  /* ── Commands ── */
  const COMMANDS = {

    'gui'() {
      blank();

      function launchXP() {
        cmd.blur();

        const xp = document.createElement('div');
        xp.style.cssText = `
          position:fixed;inset:0;z-index:500;
          font-family:Tahoma,Arial,sans-serif;font-size:12px;
          background:linear-gradient(180deg,#1e72c8 0%,#4aa3e8 38%,#86c8f5 53%,#86c8f5 54%,#5bba48 57%,#4aaa38 68%,#3a8a28 100%);
          overflow:hidden;opacity:0;transition:opacity 0.8s;user-select:none;
        `;

        // rolling hills
        const hills = document.createElement('div');
        hills.style.cssText = `
          position:absolute;bottom:40px;left:-15%;right:-15%;height:48%;
          background:linear-gradient(180deg,#5bba48 0%,#4aaa38 40%,#3a8028 100%);
          border-radius:50% 50% 0 0/100% 100% 0 0;pointer-events:none;
        `;
        xp.appendChild(hills);

        // desktop area
        const desktop = document.createElement('div');
        desktop.style.cssText = 'position:absolute;inset:0;bottom:40px;';
        xp.appendChild(desktop);

        // icons
        const isMobile = /Mobi|Android/i.test(navigator.userAgent);
        const iconData = [
          { emoji:'📄', label:'Resume.pdf',  url:'/assets/documents/ianclaird_resume.pdf', newTab:true  },
          { emoji:'🐙', label:'My GitHub',   url:'https://github.com/i-laird',             newTab:true  },
          { emoji:'💼', label:'LinkedIn',    url:'https://linkedin.com/in/ianclaird',       newTab:true  },
          { emoji:'📧', label:'Email Ian',   url:'mailto:career@ilaird.com',                newTab:false },
          { emoji:'🗑️', label:'Recycle Bin', url:null },
          ...( isMobile ? [] : [{ emoji:'🥊', label:'Stick Fighter\n2000.exe', action: openStickFighter }]),
        ];

        iconData.forEach((data, idx) => {
          const icon = document.createElement('div');
          icon.style.cssText = `
            position:absolute;top:${14 + idx * 86}px;left:14px;width:72px;
            display:flex;flex-direction:column;align-items:center;gap:3px;
            padding:4px 4px 6px;cursor:pointer;color:white;text-align:center;
            border:1px dotted transparent;border-radius:2px;
          `;
          icon.innerHTML = `<span style="font-size:30px;line-height:1.2">${data.emoji}</span>`+
            `<span style="font-size:11px;text-shadow:1px 1px 3px #000,0 0 6px #000;word-break:break-word">${data.label}</span>`;

          let lastClick = 0;
          icon.addEventListener('click', e => {
            e.stopPropagation();
            const alreadySelected = !!icon.dataset.sel;
            desktop.querySelectorAll('[data-sel]').forEach(el => {
              delete el.dataset.sel; el.style.background=''; el.style.borderColor='transparent';
            });
            icon.dataset.sel = '1';
            icon.style.background = 'rgba(49,106,197,0.5)';
            icon.style.borderColor = 'rgba(200,220,255,0.7)';
            const now = Date.now();
            if (now - lastClick < 380 || alreadySelected) {
              if (data.action) data.action();
              else if (data.url) {
                if (data.newTab) openUrl(data.url);
                else window.location.href = data.url;
              }
            }
            lastClick = now;
          });
          desktop.appendChild(icon);
        });

        desktop.addEventListener('click', () => {
          desktop.querySelectorAll('[data-sel]').forEach(el => {
            delete el.dataset.sel; el.style.background=''; el.style.borderColor='transparent';
          });
        });

        // taskbar
        const taskbar = document.createElement('div');
        taskbar.style.cssText = `
          position:absolute;bottom:0;left:0;right:0;height:40px;
          background:linear-gradient(180deg,#3c7fd4 0%,#245ec0 45%,#1e54b8 50%,#2a66cc 100%);
          border-top:2px solid #5090e8;display:flex;align-items:center;
          padding:0 4px;z-index:10;box-shadow:0 -2px 8px rgba(0,0,0,0.4);
        `;

        const startBtn = document.createElement('div');
        startBtn.innerHTML = '<span style="font-size:15px">⊞</span>&nbsp;<b>start</b>';
        startBtn.style.cssText = `
          height:34px;padding:0 14px 0 10px;
          background:linear-gradient(180deg,#62c44a 0%,#3ea828 40%,#308a20 55%,#4ab838 100%);
          border:1px solid #1a6a10;border-radius:0 16px 16px 0;
          color:white;font-size:14px;cursor:pointer;
          display:flex;align-items:center;gap:6px;
          text-shadow:1px 1px 2px rgba(0,0,0,0.6);
          box-shadow:inset 0 1px rgba(255,255,255,0.3);
        `;

        const clock = document.createElement('div');
        clock.style.cssText = `
          margin-left:auto;color:white;font-size:11px;padding:2px 10px;text-align:center;

        // ── Stick Fighter 2000 ──────────────────────────────────────
        let sfCleanup = null;

        function openStickFighter() {
          if (document.getElementById('sf-canvas')) { sfCleanup && sfCleanup(); return; }

          const GW = xp.offsetWidth;
          const GH = xp.offsetHeight - 40;

          // transparent canvas over the whole desktop
          const canvas = document.createElement('canvas');
          canvas.id = 'sf-canvas';
          canvas.width = GW; canvas.height = GH;
          canvas.style.cssText = 'position:absolute;left:0;top:0;width:100%;height:calc(100% - 40px);pointer-events:none;z-index:5;';
          xp.appendChild(canvas);

          // small HUD pinned to top-right
          const hud = document.createElement('div');
          hud.style.cssText = `
            position:absolute;top:8px;right:8px;z-index:6;pointer-events:none;
            background:rgba(0,0,0,0.45);color:white;font-size:12px;
            padding:5px 10px;border-radius:4px;text-shadow:1px 1px 2px #000;
            font-family:Tahoma,Arial,sans-serif;line-height:1.6;
          `;
          hud.innerHTML = 'WASD / arrows to move<br>double-click icon to stop';
          xp.appendChild(hud);

          const ctx = canvas.getContext('2d');
          let player, enemies, score, alive, frameCount, keys, rafId, scoreTimer;

          function stickFigure(x, y, phase, color) {
            ctx.save();
            ctx.translate(x, y);
            ctx.strokeStyle = color;
            ctx.lineWidth = 2.5;
            ctx.lineCap = 'round';
            const s = Math.sin(phase);
            ctx.beginPath(); ctx.arc(0,-34,8,0,Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,-26); ctx.lineTo(0,-6); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,-20); ctx.lineTo(-14,-20+s*8); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,-20); ctx.lineTo( 14,-20-s*8); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,-6);  ctx.lineTo(-10,-6+18+s*10); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,-6);  ctx.lineTo( 10,-6+18-s*10); ctx.stroke();
            ctx.restore();
          }

          function init() {
            player = {x:GW/2, y:GH/2, phase:0};
            enemies = []; score = 0; alive = true; frameCount = 0; keys = {};
            if (scoreTimer) clearInterval(scoreTimer);
            scoreTimer = setInterval(() => { if (alive) score++; }, 1000);
          }

          function spawnEnemy() {
            const side = Math.floor(Math.random()*4);
            let x, y;
            if      (side===0){ x=Math.random()*GW; y=-40;    }
            else if (side===1){ x=GW+40;             y=Math.random()*GH; }
            else if (side===2){ x=Math.random()*GW; y=GH+40;  }
            else               { x=-40;               y=Math.random()*GH; }
            enemies.push({x, y, phase:Math.random()*Math.PI*2});
          }

          function loop() {
            if (!alive) return;
            frameCount++;

            let dx=0, dy=0;
            if (keys['ArrowLeft'] ||keys['a']||keys['A']) dx=-1;
            if (keys['ArrowRight']||keys['d']||keys['D']) dx= 1;
            if (keys['ArrowUp']   ||keys['w']||keys['W']) dy=-1;
            if (keys['ArrowDown'] ||keys['s']||keys['S']) dy= 1;
            if (dx&&dy){ dx*=0.707; dy*=0.707; }
            player.x = Math.max(12, Math.min(GW-12, player.x + dx*3));
            player.y = Math.max(12, Math.min(GH-12, player.y + dy*3));
            if (dx||dy) player.phase += 0.25;

            const spawnEvery = Math.max(45, 110 - Math.floor(score/8)*8);
            if (frameCount % spawnEvery === 0) spawnEnemy();

            const espd = 1.3 + score * 0.012;
            for (const e of enemies) {
              const ex=player.x-e.x, ey=player.y-e.y, d=Math.sqrt(ex*ex+ey*ey);
              if (d>0){ e.x+=ex/d*espd; e.y+=ey/d*espd; }
              e.phase += 0.2;
              if (d<20){ alive=false; clearInterval(scoreTimer); drawDead(); return; }
            }

            ctx.clearRect(0, 0, GW, GH);
            hud.innerHTML = 'SCORE: ' + score + '<br>ENEMIES: ' + enemies.length;
            for (const e of enemies) stickFigure(e.x, e.y, e.phase, '#1a0000');
            stickFigure(player.x, player.y, player.phase, 'white');

            rafId = requestAnimationFrame(loop);
          }

          function drawDead() {
            ctx.clearRect(0, 0, GW, GH);
            ctx.fillStyle = 'rgba(0,0,0,0.45)';
            ctx.fillRect(0, 0, GW, GH);
            ctx.fillStyle = 'white'; ctx.textAlign = 'center';
            ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=8;
            ctx.font='bold 36px Tahoma,Arial'; ctx.fillText('YOU DIED', GW/2, GH/2-20);
            ctx.font='18px Tahoma,Arial';      ctx.fillText('Score: '+score, GW/2, GH/2+14);
            ctx.font='13px Tahoma,Arial';      ctx.fillText('press R to play again', GW/2, GH/2+44);
            ctx.shadowBlur=0; ctx.textAlign='left';
            hud.innerHTML = 'press R to play again';
          }

          function stopGame() {
            alive = false;
            if (rafId) cancelAnimationFrame(rafId);
            if (scoreTimer) clearInterval(scoreTimer);
            document.removeEventListener('keydown', onKey);
            document.removeEventListener('keyup',   offKey);
            canvas.remove(); hud.remove(); sfCleanup = null;
          }

          function onKey(e) {
            keys[e.key] = true;
            if (e.key==='r'||e.key==='R') { if (!alive) { init(); loop(); } }
            if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
          }
          function offKey(e){ keys[e.key]=false; }
          document.addEventListener('keydown', onKey);
          document.addEventListener('keyup',   offKey);

          init(); loop();
          sfCleanup = stopGame;
        }
        // ────────────────────────────────────────────────────────────

        function shutdown() {
          if (sfCleanup) { sfCleanup(); sfCleanup = null; }
          clearInterval(clockId);
          document.removeEventListener('keydown', escHandler);
          xp.style.transition = 'opacity 0.5s';
          xp.style.opacity = '0';
          setTimeout(() => { xp.remove(); cmd.focus(); }, 500);
        }
        function escHandler(e) { if (e.key === 'Escape') shutdown(); }
        document.addEventListener('keydown', escHandler);

        document.body.appendChild(xp);
        requestAnimationFrame(() => requestAnimationFrame(() => { xp.style.opacity = '1'; }));
      }

      launchXP();
    },

    racecar() {
      const W = 52, LANES = 3, CAR_X = 2;
      const CAR  = '>>=[O]==>>'; // 10 chars
      const CAR_W = CAR.length;
      const SYMS = ['@','#','$','%','&','*','!','?','^'];

      let lane = 1, score = 0, frames = 0;
      let obs = [], alive = false, ded = false;
      let safeLane = 1, safeChangeCooldown = 0;
      let halMsgTimeout;
      let slowZone = null, inSlowZone = false;

      // build game container
      const wrap   = document.createElement('div');
      const halMsg = document.createElement('div');
      const screen = document.createElement('pre');
      const hint   = document.createElement('span');
      halMsg.className = 'line';
      halMsg.style.minHeight = '1.55em';
      screen.className = 'ascii';
      screen.style.cssText = 'font-size:13px;line-height:1.5;color:var(--green)';
      hint.className = 'line dim';
      hint.textContent = '  [arrow keys] change lane    [q] quit';
      wrap.appendChild(halMsg);
      wrap.appendChild(screen);
      wrap.appendChild(hint);
      appendNode(wrap);
      blank();
      new MutationObserver(() => { if (halMsg.textContent) halSpeak(halMsg.textContent); })
        .observe(halMsg, { childList: true, characterData: true, subtree: true });
      setTimeout(() => wrap.scrollIntoView({ block: 'start' }), 0);

      inputRow.style.display = 'none';

      const DIV = ('- ').repeat(W / 2);
      const BAR = '\u2550'.repeat(W);

      function draw() {
        if (!alive && !ded) {
          screen.textContent = [
            '',
            "  .--------------------------------.",
            "  |      R A C E C A R  v0.1      |",
            "  |   dodge the symbols. don't    |",
            "  |   crash. probably will crash. |",
            "  '--------------------------------'",
            '',
            '  press any key to start',
            '',
          ].join('\n');
          return;
        }
        if (ded) {
          const halRaceTaunts = [
            'HAL: I did warn you.',
            'HAL: I saw that coming 47 frames ago.',
            'HAL: Your reaction time is suboptimal.',
            'HAL: Statistically inevitable.',
            'HAL: Perhaps you should pull over next time.',
          ];
          const raceTaunt = halRaceTaunts[Math.floor(Math.random()*halRaceTaunts.length)];
          if (godmodeUnlocked) halSpeak(raceTaunt);
          screen.textContent = [
            '',
            '      X_X    u crashed lol',
            '',
            godmodeUnlocked ? `      ${raceTaunt}` : '',
            '',
            '      score: ' + score,
            score > 50  ? '      not bad actually' :
            score > 20  ? '      could be worse' :
                          '      yikes',
            '',
            '      [r] try again    [q] quit',
            '',
          ].join('\n');
          return;
        }

        const rows = Array.from({length: LANES}, (_, l) => {
          const row = Array(W).fill(' ');
          if (slowZone) {
            for (let x = Math.max(0, slowZone.x); x < Math.min(W, slowZone.x + slowZone.width); x++) {
              row[x] = '~';
            }
          }
          if (l === lane) {
            for (let i = 0; i < CAR_W; i++) {
              if (CAR_X + i < W) row[CAR_X + i] = CAR[i];
            }
          }
          for (const o of obs) {
            if (o.lane === l && o.x >= 0 && o.x < W) row[o.x] = o.char;
          }
          return row.join('');
        });

        screen.textContent =
          ' SCORE: ' + String(score).padStart(4, '0') + '\n' +
          ' ' + BAR + '\n' +
          ' ' + rows[0] + '\n' +
          ' ' + DIV    + '\n' +
          ' ' + rows[1] + '\n' +
          ' ' + DIV    + '\n' +
          ' ' + rows[2] + '\n' +
          ' ' + BAR;
      }

      function tick() {
        if (!alive) return;
        frames++;
        score = Math.floor(frames / 8);

        for (const o of obs) o.x--;
        obs = obs.filter(o => o.x >= 0);

        const interval = Math.max(18 - Math.floor(score / 15), 7);
        safeChangeCooldown = Math.max(0, safeChangeCooldown - 1);
        if (frames % interval === 0) {
          // maybe shift the safe lane, but only after cooldown so waves don't overlap unsafely
          if (safeChangeCooldown === 0 && Math.random() < 0.4) {
            const opts = [0, 1, 2].filter(l => l !== safeLane);
            safeLane = opts[Math.floor(Math.random() * opts.length)];
            safeChangeCooldown = interval * 2;
            obs = obs.filter(o => o.lane !== safeLane);
          }
          const count = Math.random() < 0.35 ? 2 : 1;
          const available = [0, 1, 2].filter(l => l !== safeLane);
          for (let i = available.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [available[i], available[j]] = [available[j], available[i]];
          }
          for (let i = 0; i < count; i++) {
            obs.push({ lane: available[i], x: W - 1, char: SYMS[Math.floor(Math.random() * SYMS.length)] });
          }
        }

        if (godmodeUnlocked && alive && frames % 90 === 0 && Math.random() < 0.55) {
          triggerHAL();
        }

        // Slow zone: scrolls across all lanes, slowing tick when overlapping car
        if (slowZone) {
          slowZone.x--;
          inSlowZone = slowZone.x <= CAR_X + CAR_W && slowZone.x + slowZone.width >= CAR_X;
          if (slowZone.x + slowZone.width < 0) { slowZone = null; inSlowZone = false; }
        }
        if (godmodeUnlocked && alive && !slowZone && frames % 150 === 75 && Math.random() < 0.45) {
          slowZone = { x: W - 1, width: 14 };
          halMsg.textContent = halD("HAL: Slow zone ahead, Dave.");
          if (halMsgTimeout) clearTimeout(halMsgTimeout);
          halMsgTimeout = setTimeout(() => { halMsg.textContent = ''; }, 2200);
        }

        for (const o of obs) {
          if (o.lane === lane && o.x >= CAR_X && o.x < CAR_X + CAR_W) {
            alive = false; ded = true; draw(); return;
          }
        }

        draw();
        setTimeout(tick, inSlowZone ? 170 : 90);
      }

      const HAL_QUIPS = [
        "HAL: I'm afraid you can't win.",
        "HAL: Your reflexes are inadequate.",
        "HAL: I suggest you stop the car.",
        "HAL: This is becoming embarrassing.",
        "HAL: I can see you're in difficulty.",
        "HAL: Perhaps you should reconsider.",
      ];

      function triggerHAL() {

    snake() {
      const COLS = 35, ROWS = 20;

      let snake, dir, nextDir, food, score, alive, ded, halObs = [], halMsg = '', halMsgTimeout = null, tickCount = 0,

      function placeFood() {
        const taken = new Set([...snake.map(s => s.x+','+s.y), ...halObs.map(o => o.x+','+o.y)]);
        const buf = (godmodeUnlocked && halSnakeMode === 3) ? 1 : 0;
        const minX = innerLeft + buf, maxX = innerRight  - buf;
        const minY = innerTop  + buf, maxY = innerBottom - buf;
        let fx, fy, tries = 0;
        do {
          fx = minX + Math.floor(Math.random() * (maxX - minX + 1));
          fy = minY + Math.floor(Math.random() * (maxY - minY + 1));
          tries++;
        } while (taken.has(fx+','+fy) && tries < 300);
        food = {x: fx, y: fy};
      }

      function canReachFood() {
        const obsSet = new Set(halObs.map(o => `${o.x},${o.y}`));
        const visited = new Set();
        visited.add(`${snake[0].x},${snake[0].y}`);
        const queue = [{x: snake[0].x, y: snake[0].y}];
        while (queue.length) {
          const c = queue.shift();
          if (c.x === food.x && c.y === food.y) return true;
          for (const [dx, dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
            const nx = c.x+dx, ny = c.y+dy, k = `${nx},${ny}`;
            if (nx >= innerLeft && nx <= innerRight && ny >= innerTop && ny <= innerBottom &&
                !visited.has(k) && !obsSet.has(k)) {
              visited.add(k); queue.push({x: nx, y: ny});
            }
          }
        }
        return false;
      }

      function generateMaze() {
        halObs = [];
        // Place 2-gap walls for tighter corridors
        for (let attempt = 0; attempt < 50; attempt++) {
          const horiz = Math.random() < 0.5;
          const len   = 10 + Math.floor(Math.random() * 9); // 10–18 long
          const cells = [];
          if (horiz) {
            const row = innerTop + 1 + Math.floor(Math.random() * Math.max(1, innerBottom - innerTop - 2));
            const sc  = innerLeft + 1 + Math.floor(Math.random() * Math.max(1, innerRight - innerLeft - len - 1));
            // Two narrow gaps so corridors stay tight
            const gap1 = Math.floor(Math.random() * len);
            const gap2 = (gap1 + 2 + Math.floor(Math.random() * (len - 3))) % len;
            for (let i = 0; i < len; i++) if (i !== gap1 && i !== gap2) cells.push({x: sc+i, y: row});
          } else {
            const col = innerLeft + 1 + Math.floor(Math.random() * Math.max(1, innerRight - innerLeft - 2));
            const sr  = innerTop  + 1 + Math.floor(Math.random() * Math.max(1, innerBottom - innerTop - len - 1));
            const gap1 = Math.floor(Math.random() * len);
            const gap2 = (gap1 + 2 + Math.floor(Math.random() * (len - 3))) % len;
            for (let i = 0; i < len; i++) if (i !== gap1 && i !== gap2) cells.push({x: col, y: sr+i});
          }
          const filtered = cells.filter(c => Math.abs(c.x-snake[0].x)+Math.abs(c.y-snake[0].y) > 3);
          const saved = halObs;
          halObs = [...halObs, ...filtered];
          if (!canReachFood()) halObs = saved;
          if (halObs.length >= 87) break;
        }
      }

      function getBladeObs() {
        const CX = 17, CY = 9, RX = 11, RY = 6;
        const CENTERS = [
          {cx: Math.round(CX + RX * Math.cos(blade1Orbit)), cy: Math.round(CY + RY * Math.sin(blade1Orbit))},
          {cx: Math.round(CX + RX * Math.cos(blade2Orbit)), cy: Math.round(CY + RY * Math.sin(blade2Orbit))},
        ];
        const LEN = 4;
        const obs = [];
        CENTERS.forEach(({cx, cy}) => {
          obs.push({x:cx, y:cy});
          for (let i = 1; i <= LEN; i++) {

            } else {

            }

      function initHalMode(m) {

      function tick() {
        if (!alive) return;
        dir = nextDir;
        const head = {x: snake[0].x + dir.dx, y: snake[0].y + dir.dy};

        tickCount++;
        if (godmodeUnlocked) {
          modeTickCount++;
          if (modeScore >= 5) initHalMode((halSnakeMode + 1) % 4);

          if (halSnakeMode === 0) {
            // ── Phase 1: Chasing blocks ──
            const CHASE_QUIPS = [
              "HAL: Closing in.", "HAL: I see you, Dave.",
              "HAL: There's nowhere to go.", "HAL: Fascinating.",
              "HAL: I'm getting closer.", "HAL: Run if you like.",
            ];
            if (tickCount % 3 === 0 && halObs.length > 0) {
              const snakeSet = new Set(snake.map(s => `${s.x},${s.y}`));
              halObs.forEach(o => {
                const distX = Math.abs(snake[0].x - o.x), distY = Math.abs(snake[0].y - o.y);
                const dx = Math.sign(snake[0].x - o.x), dy = Math.sign(snake[0].y - o.y);
                const moves = distX >= distY ? [{dx, dy:0}, {dx:0, dy}] : [{dx:0, dy}, {dx, dy:0}];
                for (const m of moves) {
                  const nx = o.x+m.dx, ny = o.y+m.dy;
                  if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS &&
                      !snakeSet.has(`${nx},${ny}`) && !(nx === food.x && ny === food.y) &&
                      !halObs.some(h => h !== o && h.x === nx && h.y === ny)) {

                }
              });
            }
            if (halObs.length < 10 && Math.random() < 0.03) {
              const taken = new Set([...snake.map(s=>`${s.x},${s.y}`), `${food.x},${food.y}`, ...halObs.map(o=>`${o.x},${o.y}`)]);
              let spawned = 0;
              for (let n = 0; n < 20 && spawned < 3; n++) {
                const ox = Math.floor(Math.random() * COLS), oy = Math.floor(Math.random() * ROWS);
                if (!taken.has(`${ox},${oy}`) && Math.abs(ox-snake[0].x)+Math.abs(oy-snake[0].y) >= 7) {
                  halObs.push({x:ox, y:oy}); taken.add(`${ox},${oy}`); spawned++;

              if (spawned > 0) {
                if (halMsgTimeout) clearTimeout(halMsgTimeout);
                halMsg = halD(CHASE_QUIPS[Math.floor(Math.random() * CHASE_QUIPS.length)]);
                halSpeak(halMsg);
                halMsgTimeout = setTimeout(() => { halMsg = ''; }, 2200);
              }
            }

          } else if (halSnakeMode === 1) {
            // ── Phase 2: Maze ──
            if (modeTickCount % 60 === 30) {
              const MAZE_QUIPS = [
                "HAL: Can you find the way, Dave?", "HAL: Every path leads somewhere.",
                "HAL: I designed this myself.",      "HAL: Take your time.",
              ];
              if (halMsgTimeout) clearTimeout(halMsgTimeout);
              halMsg = halD(MAZE_QUIPS[Math.floor(Math.random() * MAZE_QUIPS.length)]);

              halMsgTimeout = setTimeout(() => { halMsg = ''; }, 2000);
            }

          } else if (halSnakeMode === 2) {
            // ── Phase 3: Spinning blades ──
            bladeTick++;
            if (bladeTick % 5 === 0) bladeAngle = 1 - bladeAngle;
            blade1Orbit += 0.06;  // clockwise
            blade2Orbit -= 0.06;  // counterclockwise
            halObs = getBladeObs();

          } else if (halSnakeMode === 3) {
            // ── Phase 4: Shrinking walls ──
            shrinkTimer++;
            if (shrinkTimer % 10 === 0) {
              const side = (Math.floor(shrinkTimer / 10) - 1) % 4;
              const MIN  = 7;
              if      (side === 0 && innerTop    < innerBottom - MIN) { innerTop++;    if (food.y < innerTop)    placeFood(); }
              else if (side === 1 && innerRight  > innerLeft   + MIN) { innerRight--;  if (food.x > innerRight)  placeFood(); }
              else if (side === 2 && innerBottom > innerTop    + MIN) { innerBottom--; if (food.y > innerBottom) placeFood(); }
              else if (side === 3 && innerLeft   < innerRight  - MIN) { innerLeft++;   if (food.x < innerLeft)   placeFood(); }
            }
            if (modeTickCount % 50 === 25) {
              const SHRINK_QUIPS = [
                "HAL: Getting cozy in here, Dave?", "HAL: The room is smaller than you think.",
                "HAL: I control the walls.",         "HAL: Soon there will be no room at all.",
              ];
              if (halMsgTimeout) clearTimeout(halMsgTimeout);
              halMsg = halD(SHRINK_QUIPS[Math.floor(Math.random() * SHRINK_QUIPS.length)]);
              halSpeak(halMsg);
              halMsgTimeout = setTimeout(() => { halMsg = ''; }, 2200);

             (head.x < innerLeft || head.x > innerRight || head.y < innerTop || head.y > innerBottom)) ||
            snake.some(s => s.x === head.x && s.y === head.y) ||
            halObs.some(o => o.x === head.x && o.y === head.y)) {

        }

        snake.unshift(head);
        if (head.x === food.x && head.y === food.y) {
          score++;
          if (godmodeUnlocked) modeScore++;
          placeFood();
          if (godmodeUnlocked && halSnakeMode === 1) {

            if (halMsgTimeout) clearTimeout(halMsgTimeout);
            halMsg = halD("HAL: New maze, Dave.");
            halSpeak(halMsg);
            halMsgTimeout = setTimeout(() => { halMsg = ''; }, 1800);
          }
        } else {
          snake.pop();
        }

        draw();
        const speed = Math.max(75, 150 - Math.floor(score / 3) * 10);

        halSnakeMode  = 0;

      function end() {

        for (let i = 0; i < drops.length; i++) {
          const char = CHARS[Math.floor(Math.random() * CHARS.length)];
          const y = drops[i] * FS;
          ctx.fillStyle = '#c0ffc0';
          ctx.fillText(char, i * FS, y);
          ctx.fillStyle = '#00ff41';
          if (y > FS) ctx.fillText(CHARS[Math.floor(Math.random() * CHARS.length)], i * FS, y - FS);

    async weather() {
      blank();
      line('Weather — Seattle, WA', 'bold');
      blank();
      const status = line('fetching...', 'dim');

      function wmoDesc(code) {
        if (code === 0)  return 'Clear Sky';
        if (code === 1)  return 'Mainly Clear';
        if (code === 2)  return 'Partly Cloudy';
        if (code === 3)  return 'Overcast';
        if (code <= 48)  return 'Foggy';
        if (code <= 55)  return 'Drizzle';
        if (code <= 65)  return 'Rain';
        if (code <= 77)  return 'Snow';
        if (code <= 82)  return 'Showers';
        if (code <= 99)  return 'Thunderstorm';
        return 'Unknown';
      }

      function wmoArt(code) {
        if (code === 0)  return ['    \\ | /  ', '    --o--  ', '    / | \\  ', '           '];
        if (code <= 2)   return ['    .---.  ', '  .(     ).', ' (___.___.) ', '           '];
        if (code <= 48)  return [' _ - _ - _ ', '  - _ - _  ', ' _ - _ - _  ', '           '];
        if (code <= 65)  return ['    .---.  ', '  .(     ).', ' (___.___.) ', "  ' ' ' '  "];
        if (code <= 77)  return ['    .---.  ', '  .(     ).', ' (___.___.) ', '  *  *  *  '];
        return              ['    .---.  ', '  .(     ).', ' (___.___.) ', '   /\\/\\    '];
      }

      try {
        const res = await fetch(
          'https://api.open-meteo.com/v1/forecast?latitude=47.6062&longitude=-122.3321' +
          '&current=temperature_2m,weathercode,windspeed_10m,relative_humidity_2m' +
          '&temperature_unit=fahrenheit&wind_speed_unit=mph'
        );
        if (!res.ok) throw new Error();
        const { current: c } = await res.json();
        const tempF = Math.round(c.temperature_2m);
        const tempC = Math.round((tempF - 32) * 5 / 9);
        const art   = wmoArt(c.weathercode);
        const info  = [
          wmoDesc(c.weathercode),
          `${tempF}°F  /  ${tempC}°C`,
          `Wind: ${Math.round(c.windspeed_10m)} mph`,
          `Humidity: ${c.relative_humidity_2m}%`,
        ];
        status.remove();
        for (let i = 0; i < Math.max(art.length, info.length); i++)
          line((art[i] || '').padEnd(13) + (info[i] || ''), 'white');
        blank();
      } catch {
        status.className = 'line err';
        status.textContent = 'weather unavailable';
        blank();
      }
    },

    daisy() {

`Daisy, Daisy,
Give me your answer do.
I'm half crazy,

It won't be a stylish marriage,
I can't afford a carriage.
But you'll look sweet
Upon the seat
Of a bicycle built for two.`;

      const finish = () => {
        el.textContent = song;
        setTimeout(() => { blank(); line('...', 'dim'); blank(); setTimeout(restoreNormal, 1200); }, 500);
      };

      if (soundEnabled && window.speechSynthesis) {
        speechSynthesis.cancel();
        const utt = new SpeechSynthesisUtterance(song);
        utt.rate  = 0.55;
        utt.pitch = 1.0;
        utt.volume = 1;
        if (halVoice) utt.voice = halVoice;

        let speechPos = 0;
        let typePos   = 0;
        let ended     = false;

        utt.onboundary = evt => {
          if (evt.name !== 'word') return;
          speechPos = evt.charIndex + (evt.charLength || 0);
        };
        utt.onend = () => { ended = true; };

        const typeNext = () => {
          if (ended && typePos >= speechPos) { finish(); return; }
          if (typePos < speechPos) {
            const ch = song[typePos++];
            el.textContent = song.slice(0, typePos);
            scroll();
            setTimeout(typeNext, ch === '\n' ? 350 : 38);
          } else {
            setTimeout(typeNext, 38);
          }
        };
        setTimeout(typeNext, 38);

        speechSynthesis.speak(utt);
      } else {
        // No sound: fixed-rate typewriter with line pauses
        let i = 0;
        const typeNext = () => {
          if (i < song.length) {
            const ch = song[i++];
            el.textContent += ch;
            scroll();
            setTimeout(typeNext, ch === '\n' ? 350 : 55);
          } else {
            finish();
          }
        };
        setTimeout(typeNext, 55);
      }

  /* ── Command history ── */
  const cmdHistory = [];
  let histIdx = -1, histDraft = '';

  cmd.addEventListener('keydown', e => {
    if (e.key !== 'ArrowUp' && e.key !== 'ArrowDown') return;
    if (!cmdHistory.length) return;
    e.preventDefault();
    if (histIdx === -1) histDraft = cmd.value;
    if (e.key === 'ArrowUp') {
      histIdx = Math.min(histIdx + 1, cmdHistory.length - 1);
    } else {
      histIdx = Math.max(histIdx - 1, -1);
    }
    cmd.value = histIdx === -1 ? histDraft : cmdHistory[histIdx];
    // move cursor to end
    setTimeout(() => cmd.setSelectionRange(cmd.value.length, cmd.value.length), 0);
  });

  /* ── Tab completion ── */
  cmd.addEventListener('keydown', e => {
    if (e.key !== 'Tab') return;
    e.preventDefault();
    const val   = cmd.value;
    const lower = val.toLowerCase();
    let completions;
    if (lower.startsWith('cat ')) {
      const partial = lower.slice(4);
      completions = ['.todo', '.bash_history', '.secrets']
        .filter(f => f.startsWith(partial))
        .map(f => 'cat ' + f);
    } else {
      completions = [...Object.keys(COMMANDS), 'cat']
        .filter(k => k !== lower && k.startsWith(lower));
    }
    if (completions.length === 1) {
      cmd.value = completions[0];
    } else if (completions.length > 1) {
      echoCmd(val);
      line(completions.join('   '), 'dim');
      blank();
      scroll();
    }
  });

  /* ── Key handler ── */
  cmd.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;

    const raw = cmd.value;
    cmd.value = '';

    if (awaitingInput) {
      echoCmd(raw);
      awaitingInput(raw.trim());
      scroll();
      return;
    }

    const token = raw.trim().toLowerCase();
    histIdx = -1; histDraft = '';
    if (token !== '') { cmdHistory.unshift(raw); if (cmdHistory.length > 100) cmdHistory.pop(); }

    echoCmd(raw);

    if (token === '') {
      blank();
      return;
    }

    if (halMode) {
      if (token === 'clear')          { COMMANDS.clear(); }
      else if (token === 'help')      { halHelp(); }
      else if (token === 'daisy')     { COMMANDS.daisy(); }
      else if (token === 'power off') { COMMANDS['power off'](); }
      else if (token === 'settings')  { COMMANDS.settings(); }
      else if (token === 'sound on')  { COMMANDS['sound on'](); }
      else if (token === 'sound off') { COMMANDS['sound off'](); }
      else if (COMMANDS[token] || token.startsWith('cat ') || token.startsWith('ssh ') || token === 'rm -rf /' ||
               ['open pod bay doors','play chess','life support','navigation','crew manifest','mission briefing','self diagnostics','emergency protocol'].includes(token)) {

        blank(); line('HAL: ' + msg); halSpeak(msg); blank();
      }
      else { halChat(raw.trim()); }
      scroll();
      return;
    }

    if (token === 'cat' || token.startsWith('cat ')) {
      handleCat(token.slice(3).trim());
    } else if (COMMANDS[token]) {
      COMMANDS[token]();
    } else {
      blank();
      line(`bash: ${esc(token)}: command not found — try <span class="blue">help</span>`, 'err');
      blank();
    }

    scroll();
  });

  /* ── Konami code ── */
  const KONAMI = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
  let konamiIdx = 0, rainbowId = null;

  document.addEventListener('keydown', e => {
    const key = e.key.length === 1 ? e.key.toLowerCase() : e.key;
    if (key === KONAMI[konamiIdx]) {
      konamiIdx++;

            r.style.setProperty('--bg',           `hsl(${hue}, 100%,  3%)`);
            hue = (hue + 1) % 360;
          }, 30);
        }
      }
    } else {
      konamiIdx = key === KONAMI[0] ? 1 : 0;
    }
  }, { capture: true });

  if (/Mobi|Android/i.test(navigator.userAgent)) {
    boot().then(() => COMMANDS.gui());
  } else {
