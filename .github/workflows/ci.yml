name: CI

# Pull-request checks. Pushes to main are checked by deploy.yml (which runs the
# same `npm run check` before building/deploying), so this no longer runs on push
# to avoid a redundant double-run.
on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  check:
    name: Lint, format & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # 22+: html-validate's CLI uses fs.globSync, which doesn't exist on Node 20.
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Validate HTML
        run: npm run lint:html

      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Run tests
        run: npm test
